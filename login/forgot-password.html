<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .card {
        background: #ffffff;
        padding: 2.5rem 2rem;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
        width: 100%;
        max-width: 380px;
      }

      .card h2 {
        text-align: center;
        margin-bottom: 0.5rem;
        color: #2c3e50;
        font-size: 1.5rem;
      }

      .subtitle {
        text-align: center;
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 1.6rem;
      }

      .form-group {
        margin-bottom: 1.2rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.4rem;
        font-size: 0.9rem;
        color: #555;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 0.6rem 0.8rem;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 1rem;
        transition: border-color 0.2s;
        outline: none;
      }

      .form-group input:focus {
        border-color: #3498db;
      }

      .form-group input.monospace {
        font-family: monospace;
      }

      .btn {
        width: 100%;
        padding: 0.7rem;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 0.3rem;
        transition: background 0.2s;
      }

      .btn-blue { background: #3498db; }
      .btn-blue:hover:not(:disabled) { background: #2980b9; }
      .btn-green { background: #27ae60; }
      .btn-green:hover:not(:disabled) { background: #219150; }

      .btn:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .error-msg {
        color: #e74c3c;
        font-size: 0.88rem;
        text-align: center;
        margin-top: 1rem;
      }

      .success-text {
        text-align: center;
        color: #27ae60;
        font-size: 0.88rem;
        margin-bottom: 1.4rem;
      }

      .back-link {
        display: block;
        text-align: center;
        margin-top: 1.2rem;
        font-size: 0.9rem;
        color: #3498db;
        text-decoration: none;
      }

      .back-link:hover { text-decoration: underline; }

      .step { display: none; }
      .step.active { display: block; }
    </style>
  </head>
  <body>
    <div class="card">

      <!-- Step 1: Request reset token -->
      <div class="step active" id="stepRequest">
        <h2>Forgot Password</h2>
        <p class="subtitle">Enter your email address and we'll send you a reset token.</p>
        <form id="requestForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required />
          </div>
          <button type="submit" class="btn btn-blue" id="requestBtn">Send Reset Token</button>
          <p class="error-msg" id="requestError" style="display:none;"></p>
        </form>
        <a href="#" class="back-link" id="backLink1">Back to Login</a>
      </div>

      <!-- Step 2: Enter token and new password -->
      <div class="step" id="stepReset">
        <h2>Reset Password</h2>
        <p class="success-text">A reset token has been issued. Enter it below along with your new password.</p>
        <form id="resetForm">
          <div class="form-group">
            <label for="resetToken">Reset Token</label>
            <input type="text" id="resetToken" class="monospace" placeholder="Paste your reset token" required />
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="At least 8 characters" minlength="8" required />
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat new password" required />
          </div>
          <button type="submit" class="btn btn-green" id="resetBtn">Reset Password</button>
          <p class="error-msg" id="resetError" style="display:none;"></p>
        </form>
        <a href="#" class="back-link" id="backLink2">Back to Login</a>
      </div>

      <!-- Step 3: Done -->
      <div class="step" id="stepDone">
        <h2 style="color:#27ae60;">Password Reset!</h2>
        <p class="subtitle" style="margin-top:0.5rem;">Your password has been updated. You can now sign in.</p>
        <button class="btn btn-blue" id="goLoginBtn" style="margin-top:1.5rem;">Back to Login</button>
      </div>

    </div>

    <script>
      const API_BASE = 'http://localhost:8080/api';

      const params = new URLSearchParams(window.location.search);
      const redirectParam = params.get('redirect') || '';
      const loginUrl = 'index.html' + (redirectParam ? `?redirect=${encodeURIComponent(redirectParam)}` : '');

      function showStep(id) {
        document.querySelectorAll('.step').forEach((el) => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
      }

      function goLogin() {
        window.location.href = loginUrl;
      }

      document.getElementById('backLink1').addEventListener('click', (e) => { e.preventDefault(); goLogin(); });
      document.getElementById('backLink2').addEventListener('click', (e) => { e.preventDefault(); goLogin(); });
      document.getElementById('goLoginBtn').addEventListener('click', goLogin);

      // Step 1: request reset token
      document.getElementById('requestForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('requestBtn');
        const errEl = document.getElementById('requestError');
        errEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Sending…';

        const email = document.getElementById('email').value;

        try {
          const res = await fetch(`${API_BASE}/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || 'Something went wrong. Please try again.');
          }

          // Pre-fill token if returned directly (demo convenience)
          if (data.reset_token) {
            document.getElementById('resetToken').value = data.reset_token;
          }

          showStep('stepReset');
        } catch (err) {
          errEl.textContent = err.message;
          errEl.style.display = 'block';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Send Reset Token';
        }
      });

      // Step 2: reset password
      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('resetBtn');
        const errEl = document.getElementById('resetError');
        errEl.style.display = 'none';

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
          errEl.textContent = 'Passwords do not match.';
          errEl.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting…';

        try {
          const res = await fetch(`${API_BASE}/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              token: document.getElementById('resetToken').value,
              password: newPassword,
            }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || 'Reset failed. Please try again.');
          }

          showStep('stepDone');
        } catch (err) {
          errEl.textContent = err.message;
          errEl.style.display = 'block';
        } finally {
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      });
    </script>
  </body>
</html>
