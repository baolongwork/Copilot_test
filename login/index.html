<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .login-card {
        background: #ffffff;
        padding: 2.5rem 2rem;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
        width: 100%;
        max-width: 360px;
      }

      .login-card h2 {
        text-align: center;
        margin-bottom: 1.8rem;
        color: #2c3e50;
        font-size: 1.6rem;
      }

      .form-group {
        margin-bottom: 1.2rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.4rem;
        font-size: 0.9rem;
        color: #555;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 0.6rem 0.8rem;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 1rem;
        transition: border-color 0.2s;
        outline: none;
      }

      .form-group input:focus {
        border-color: #3498db;
      }

      .btn-login {
        width: 100%;
        padding: 0.7rem;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: background 0.2s;
      }

      .btn-login:hover:not(:disabled) {
        background: #2980b9;
      }

      .btn-login:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .error-msg {
        color: #e74c3c;
        font-size: 0.88rem;
        text-align: center;
        margin-top: 1rem;
      }

      .forgot-link {
        display: block;
        text-align: center;
        margin-top: 1.2rem;
        font-size: 0.9rem;
        color: #3498db;
        text-decoration: none;
      }

      .forgot-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h2>Sign In</h2>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
          />
        </div>
        <button type="submit" class="btn-login" id="submitBtn">Sign In</button>
        <p class="error-msg" id="errorMsg" style="display:none;"></p>
      </form>
      <a href="#" class="forgot-link" id="forgotLink">Forgot your password?</a>
    </div>

    <script>
      const API_BASE = 'http://localhost:8080/api';

      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in…';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const params = new URLSearchParams(window.location.search);
        const redirectUrl = params.get('redirect') || 'http://localhost:5173';

        try {
          const res = await fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || 'Login failed. Please try again.');
          }

          localStorage.setItem('session_token', data.token);
          localStorage.setItem('session_user', JSON.stringify(data.user));

          window.location.href = redirectUrl;
        } catch (err) {
          errorMsg.textContent = err.message;
          errorMsg.style.display = 'block';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      });

      document.getElementById('forgotLink').addEventListener('click', (e) => {
        e.preventDefault();
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect') || '';
        window.location.href = 'forgot-password.html' + (redirect ? `?redirect=${encodeURIComponent(redirect)}` : '');
      });
    </script>
  </body>
</html>
