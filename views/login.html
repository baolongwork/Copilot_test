<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      width: 100%;
      max-width: 400px;
    }
    h1 { text-align: center; color: #333; margin-bottom: 1.5rem; font-size: 1.6rem; }
    .form-group { margin-bottom: 1.2rem; }
    label { display: block; margin-bottom: .4rem; font-size: .9rem; color: #555; font-weight: 600; }
    input {
      width: 100%;
      padding: .65rem .85rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #4f46e5; }
    .btn {
      width: 100%;
      padding: .75rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: .5rem;
    }
    .btn:hover { background: #4338ca; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .error-msg {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
      border-radius: 6px;
      padding: .6rem .85rem;
      font-size: .88rem;
      margin-bottom: 1rem;
      display: none;
    }
    .footer-link { text-align: center; margin-top: 1.2rem; font-size: .9rem; color: #555; }
    .footer-link a { color: #4f46e5; text-decoration: none; font-weight: 600; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign In</h1>
    <div class="error-msg" id="errorMsg"></div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn" id="submitBtn">Login</button>
    </form>
    <p class="footer-link">Don't have an account? <a href="/register">Register</a></p>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "Signing in…";

      const payload = {
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
      };

      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.error || "Login failed.";
          errorMsg.style.display = "block";
        } else {
          window.location.href = data.redirect || "/dashboard";
        }
      } catch {
        errorMsg.textContent = "Network error. Please try again.";
        errorMsg.style.display = "block";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Login";
      }
    });
  </script>
</body>
</html>
