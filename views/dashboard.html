<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center;
           align-items: center; min-height: 100vh; margin: 0; background: #f0f2f5; }
    .card { background: #fff; padding: 2rem 2.5rem; border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,.15); text-align: center; }
    h1 { color: #333; }
    p { color: #555; }
    a { color: #4f46e5; text-decoration: none; font-weight: 600; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Welcome, <span id="userName"></span>!</h1>
    <p>You are now logged in.</p>
    <p><a href="#" id="logoutLink">Logout</a></p>
  </div>

  <script>
    fetch("/api/me")
      .then((res) => {
        if (!res.ok) {
          window.location.href = "/login";
          return;
        }
        return res.json();
      })
      .then((data) => {
        if (data) {
          document.getElementById("userName").textContent = data.name;
        }
      })
      .catch(() => {
        window.location.href = "/login";
      });

    document.getElementById("logoutLink").addEventListener("click", async (e) => {
      e.preventDefault();
      const res = await fetch("/logout", { method: "POST" });
      if (!res.ok) {
        window.location.href = "/login";
        return;
      }
      const data = await res.json();
      window.location.href = data.redirect || "/login";
    });
  </script>
</body>
</html>
