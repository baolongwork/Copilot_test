name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: NPM Registry
        run: |
          echo "0.0.0.0 registry.npmjs.org" | sudo tee -a /etc/hosts
          echo "0.0.0.0 google.com" | sudo tee -a /etc/hosts

      - name: Check
        run: curl https://google.com

      - name: Install Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Package install
        run: npm install
