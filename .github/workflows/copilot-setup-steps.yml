name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout Firewall
        run: |
          echo "--- NPM ---"
          curl -I -s --connect-timeout 5 https://registry.npmjs.org | grep "HTTP/"
          
          echo "--- Nodejs ---"
          curl -I -s --connect-timeout 5 https://nodejs.org | grep "HTTP/"
          
          echo "--- IFCONFIG"
          curl -s --connect-timeout 5 https://ifconfig.me

      - name: Install Nodejs
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Package install
        run: npm install
