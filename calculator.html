<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two Number Calculator</title>
    <style>
        :root {
            --brand: #334155;
            --brand-hover: #1e293b;
            --danger: #b91c1c;
            --danger-hover: #991b1b;
            --surface: #ffffff;
            --surface-muted: #f8fafc;
            --border: #cbd5e1;
            --focus-ring: #0ea5e9;
            --text: #0f172a;
            --error: #b91c1c;
            --success: #166534;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 20%, #dbeafe 0, #e2e8f0 40%, #cbd5e1 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            padding: 1rem;
        }

        .app-container {
            background: var(--surface);
            padding: 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.2);
            width: 100%;
            max-width: 420px;
        }

        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        h2 {
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        .description {
            color: #334155;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input[type="number"],
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 0.4rem;
            font-size: 1rem;
        }

        input:focus,
        button:focus-visible {
            outline: 3px solid var(--focus-ring);
            outline-offset: 2px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.625rem;
            margin-bottom: 1rem;
        }

        button {
            padding: 0.75rem;
            border: none;
            border-radius: 0.4rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .operation-btn,
        .primary-btn {
            background-color: var(--brand);
            color: #fff;
        }

        .operation-btn:hover,
        .primary-btn:hover {
            background-color: var(--brand-hover);
        }

        .clear-btn,
        .logout-btn {
            background-color: var(--danger);
            color: #fff;
        }

        .clear-btn:hover,
        .logout-btn:hover {
            background-color: var(--danger-hover);
        }

        .clear-btn {
            grid-column: 1 / -1;
        }

        .result-container {
            background-color: var(--surface-muted);
            padding: 1rem;
            border-radius: 0.4rem;
            min-height: 80px;
        }

        .result-label {
            color: #475569;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--brand);
            word-break: break-word;
        }

        .message {
            margin-top: 0.75rem;
            min-height: 1.2rem;
            font-size: 0.95rem;
        }

        .error {
            color: var(--error);
        }

        .success {
            color: var(--success);
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .hidden {
            display: none;
        }

        .top-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 1.25rem;
            }

            .button-group {
                grid-template-columns: 1fr;
            }

            .clear-btn {
                grid-column: auto;
            }
        }
    </style>
</head>
<body>
    <main class="app-container" aria-labelledby="page-title">
        <h1 id="page-title">Two Number Calculator</h1>

        <section id="login-section" aria-labelledby="login-title">
            <h2 id="login-title">Login</h2>
            <p class="description">Sign in to access the calculator.</p>
            <form id="login-form" novalidate>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        required
                        aria-describedby="login-help"
                    >
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                        aria-describedby="login-help"
                    >
                </div>
                <p id="login-help" class="description">Demo credentials: username <strong>admin</strong>, password <strong>password123</strong></p>
                <button type="submit" class="primary-btn">Sign In</button>
                <p id="login-message" class="message" aria-live="assertive"></p>
            </form>
        </section>

        <section id="calculator-section" class="hidden" aria-labelledby="calculator-title">
            <div class="top-actions">
                <button type="button" id="logout-btn" class="logout-btn">Log Out</button>
            </div>

            <h2 id="calculator-title">Calculator</h2>
            <p id="auth-status" class="message success" aria-live="polite"></p>

            <div class="input-group">
                <label for="num1">First Number</label>
                <input type="number" id="num1" placeholder="Enter first number" step="any">
            </div>

            <div class="input-group">
                <label for="num2">Second Number</label>
                <input type="number" id="num2" placeholder="Enter second number" step="any">
            </div>

            <div>
                <p class="description">Select an operation:</p>
                <div class="button-group">
                    <button type="button" class="operation-btn" data-operation="add">Add (+)</button>
                    <button type="button" class="operation-btn" data-operation="subtract">Subtract (-)</button>
                    <button type="button" class="operation-btn" data-operation="multiply">Multiply (x)</button>
                    <button type="button" class="operation-btn" data-operation="divide">Divide (/)</button>
                    <button type="button" class="operation-btn" data-operation="power">Power (^)</button>
                    <button type="button" class="operation-btn" data-operation="modulo">Modulo (%)</button>
                    <button type="button" class="operation-btn" data-operation="perfectSquare">Perfect Square (n²)</button>
                    <button type="button" class="clear-btn" id="clear-btn">Clear All</button>
                </div>
            </div>

            <div class="result-container" role="status" aria-live="polite">
                <div class="result-label">Result</div>
                <div class="result-value" id="result">0</div>
                <p class="message error" id="calc-error"></p>
            </div>
        </section>

        <p id="screen-reader-status" class="sr-only" aria-live="polite"></p>
    </main>

    <script>
        const DEMO_CREDENTIALS = {
            username: "admin",
            password: "password123"
        };
        const AUTH_STORAGE_KEY = "calculatorLoggedIn";

        const ZERO_DIV_ERROR = "Cannot divide by zero";
        const MODULO_ZERO_ERROR = "Cannot modulo by zero";
        const OPERATIONS = {
            add: (a, b) => a + b,
            subtract: (a, b) => a - b,
            multiply: (a, b) => a * b,
            divide: (a, b) => {
                if (b === 0) throw new Error(ZERO_DIV_ERROR);
                return a / b;
            },
            power: (a, b) => Math.pow(a, b),
            modulo: (a, b) => {
                if (b === 0) throw new Error(MODULO_ZERO_ERROR);
                return a % b;
            },
            perfectSquare: (a) => a * a  // canonical implementation in perfectSquare.js
        };

        const loginSection = document.getElementById("login-section");
        const calculatorSection = document.getElementById("calculator-section");
        const loginForm = document.getElementById("login-form");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const loginMessage = document.getElementById("login-message");
        const authStatus = document.getElementById("auth-status");
        const screenReaderStatus = document.getElementById("screen-reader-status");
        const logoutButton = document.getElementById("logout-btn");

        const num1Input = document.getElementById("num1");
        const num2Input = document.getElementById("num2");
        const resultDisplay = document.getElementById("result");
        const calcErrorDisplay = document.getElementById("calc-error");
        const clearButton = document.getElementById("clear-btn");
        const operationButtons = document.querySelectorAll(".operation-btn");

        function announce(message) {
            screenReaderStatus.textContent = message;
        }

        function setLoginMessage(message, isError) {
            loginMessage.textContent = message;
            loginMessage.className = isError ? "message error" : "message success";
            announce(message);
        }

        function showCalculator(username) {
            loginSection.classList.add("hidden");
            calculatorSection.classList.remove("hidden");
            authStatus.textContent = "Signed in as " + username + ".";
            num1Input.focus();
            announce("Login successful. Calculator is ready.");
        }

        function showLogin() {
            calculatorSection.classList.add("hidden");
            loginSection.classList.remove("hidden");
            usernameInput.focus();
            announce("You are logged out. Login form available.");
        }

        function setAuthState(isLoggedIn) {
            localStorage.setItem(AUTH_STORAGE_KEY, isLoggedIn ? "true" : "false");
        }

        function getInputs() {
            return {
                num1: parseFloat(num1Input.value),
                num2: parseFloat(num2Input.value)
            };
        }

        function formatResult(value) {
            if (!Number.isFinite(value)) return String(value);
            // Round to 10 significant digits to avoid floating-point noise
            const rounded = parseFloat(value.toPrecision(10));
            return String(rounded);
        }

        function displayResult(value) {
            const formatted = formatResult(value);
            resultDisplay.textContent = formatted;
            calcErrorDisplay.textContent = "";
            announce("Result updated to " + formatted);
        }

        function displayCalcError(message) {
            calcErrorDisplay.textContent = message;
            resultDisplay.textContent = "0";
            announce("Calculation error: " + message);
        }

        function calculate(operation) {
            const inputs = getInputs();

            if (Number.isNaN(inputs.num1)) {
                displayCalcError("Please enter valid numbers");
                return;
            }

            const singleInputOps = ["perfectSquare"];
            const isSingleInput = singleInputOps.includes(operation);

            if (!isSingleInput && Number.isNaN(inputs.num2)) {
                displayCalcError("Please enter valid numbers");
                return;
            }

            const fn = OPERATIONS[operation];
            if (!fn) {
                displayCalcError("Invalid operation");
                return;
            }

            try {
                displayResult(isSingleInput ? fn(inputs.num1) : fn(inputs.num1, inputs.num2));
            } catch (error) {
                displayCalcError(error.message);
            }
        }

        function clearAll() {
            num1Input.value = "";
            num2Input.value = "";
            resultDisplay.textContent = "0";
            calcErrorDisplay.textContent = "";
            num1Input.focus();
            announce("Calculator inputs and result cleared.");
        }

        loginForm.addEventListener("submit", function(event) {
            event.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                setLoginMessage("Please enter both username and password.", true);
                if (!username) {
                    usernameInput.focus();
                } else {
                    passwordInput.focus();
                }
                return;
            }

            if (username === DEMO_CREDENTIALS.username && password === DEMO_CREDENTIALS.password) {
                setAuthState(true);
                setLoginMessage("Login successful.", false);
                showCalculator(username);
                return;
            }

            setAuthState(false);
            setLoginMessage("Invalid username or password.", true);
            passwordInput.value = "";
            passwordInput.focus();
        });

        logoutButton.addEventListener("click", function() {
            setAuthState(false);
            loginForm.reset();
            clearAll();
            setLoginMessage("You have been logged out.", false);
            showLogin();
        });

        let lastOperation = null;

        clearButton.addEventListener("click", clearAll);
        operationButtons.forEach(function(button) {
            button.addEventListener("click", function() {
                const op = button.getAttribute("data-operation");
                lastOperation = op;
                calculate(op);
            });
        });

        [num1Input, num2Input].forEach(function(inputElement) {
            inputElement.addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    calculate(lastOperation || "add");
                }
            });
        });

        if (localStorage.getItem(AUTH_STORAGE_KEY) === "true") {
            showCalculator(DEMO_CREDENTIALS.username);
        } else {
            showLogin();
        }
    </script>
</body>
</html>
