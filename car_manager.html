<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car List Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 32px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 6px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"] {
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background-color: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background-color: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background-color: #6b7280;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #4b5563;
            transform: translateY(-1px);
        }

        .search-bar {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 15px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .search-bar:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        thead th {
            background-color: #667eea;
            color: white;
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
        }

        thead th:first-child { border-radius: 5px 0 0 0; }
        thead th:last-child  { border-radius: 0 5px 0 0; }

        tbody tr {
            border-bottom: 1px solid #e5e7eb;
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f3f4f6;
        }

        tbody td {
            padding: 11px 14px;
            color: #374151;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn-edit {
            padding: 6px 14px;
            font-size: 13px;
            background-color: #f59e0b;
            color: white;
            border-radius: 4px;
        }

        .btn-edit:hover {
            background-color: #d97706;
        }

        .btn-delete {
            padding: 6px 14px;
            font-size: 13px;
            background-color: #ef4444;
            color: white;
            border-radius: 4px;
        }

        .btn-delete:hover {
            background-color: #dc2626;
        }

        .empty-message {
            text-align: center;
            color: #9ca3af;
            padding: 30px;
            font-size: 15px;
        }

        .alert {
            padding: 10px 14px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .alert-error {
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Car List Manager</h1>

        <!-- Add / Edit Form -->
        <div class="card">
            <h2 id="form-title">Add New Car</h2>
            <div id="alert" class="alert"></div>
            <div class="form-grid">
                <div class="form-group">
                    <label for="make">Make</label>
                    <input type="text" id="make" placeholder="e.g. Toyota">
                </div>
                <div class="form-group">
                    <label for="model">Model</label>
                    <input type="text" id="model" placeholder="e.g. Corolla">
                </div>
                <div class="form-group">
                    <label for="year">Year</label>
                    <input type="number" id="year" placeholder="e.g. 2023" min="1886" max="2100">
                </div>
                <div class="form-group">
                    <label for="color">Color</label>
                    <input type="text" id="color" placeholder="e.g. Red">
                </div>
            </div>
            <div class="btn-row">
                <button class="btn-primary" onclick="saveCar()">💾 Save Car</button>
                <button class="btn-secondary" onclick="cancelEdit()" id="cancel-btn" style="display:none">✕ Cancel</button>
            </div>
        </div>

        <!-- Car List -->
        <div class="card">
            <h2>Car List</h2>
            <input type="text" class="search-bar" id="search" placeholder="🔍 Search by make, model, year, or color..." oninput="renderTable()">
            <div class="stats" id="stats"></div>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Make</th>
                        <th>Model</th>
                        <th>Year</th>
                        <th>Color</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="car-table-body">
                </tbody>
            </table>
            <div class="empty-message" id="empty-message" style="display:none">No cars found. Add your first car above!</div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'car_manager_cars';
        let cars = [];
        let editingId = null;
        let nextId = 1;

        // ── Persistence ──────────────────────────────────────────────────────
        function loadCars() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                cars = data ? JSON.parse(data) : [];
                nextId = cars.reduce((max, c) => Math.max(max, c.id + 1), 1);
            } catch (e) {
                console.error('Failed to load cars from localStorage:', e);
                cars = [];
                nextId = 1;
            }
        }

        function saveCars() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cars));
        }

        // ── Alerts ───────────────────────────────────────────────────────────
        function showAlert(message, type) {
            const el = document.getElementById('alert');
            el.textContent = message;
            el.className = 'alert alert-' + type;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        // ── Form helpers ─────────────────────────────────────────────────────
        function getFormValues() {
            return {
                make:  document.getElementById('make').value.trim(),
                model: document.getElementById('model').value.trim(),
                year:  document.getElementById('year').value.trim(),
                color: document.getElementById('color').value.trim(),
            };
        }

        function clearForm() {
            ['make', 'model', 'year', 'color'].forEach(id => {
                document.getElementById(id).value = '';
            });
        }

        function validateCar(car) {
            if (!car.make)  return 'Make is required.';
            if (!car.model) return 'Model is required.';
            if (!car.year)  return 'Year is required.';
            const year = parseInt(car.year, 10);
            if (isNaN(year) || year < 1886 || year > 2100) return 'Year must be between 1886 and 2100.';
            if (!car.color) return 'Color is required.';
            return null;
        }

        // ── CRUD ─────────────────────────────────────────────────────────────
        function saveCar() {
            const values = getFormValues();
            const error = validateCar(values);
            if (error) {
                showAlert(error, 'error');
                return;
            }

            if (editingId !== null) {
                const idx = cars.findIndex(c => c.id === editingId);
                if (idx !== -1) {
                    cars[idx] = { id: editingId, ...values, year: parseInt(values.year, 10) };
                }
                showAlert('Car updated successfully!', 'success');
                cancelEdit();
            } else {
                const id = nextId++;
                cars.push({ id, ...values, year: parseInt(values.year, 10) });
                showAlert('Car added successfully!', 'success');
                clearForm();
            }

            saveCars();
            renderTable();
        }

        function editCar(id) {
            const car = cars.find(c => c.id === id);
            if (!car) return;

            editingId = id;
            document.getElementById('make').value  = car.make;
            document.getElementById('model').value = car.model;
            document.getElementById('year').value  = car.year;
            document.getElementById('color').value = car.color;

            document.getElementById('form-title').textContent = 'Edit Car';
            document.getElementById('cancel-btn').style.display = 'inline-block';
            document.getElementById('make').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteCar(id) {
            if (!confirm('Are you sure you want to delete this car?')) return;
            cars = cars.filter(c => c.id !== id);
            saveCars();
            renderTable();
            showAlert('Car deleted.', 'success');
        }

        function cancelEdit() {
            editingId = null;
            clearForm();
            document.getElementById('form-title').textContent = 'Add New Car';
            document.getElementById('cancel-btn').style.display = 'none';
        }

        // ── Render ───────────────────────────────────────────────────────────
        function renderTable() {
            const query = document.getElementById('search').value.trim().toLowerCase();
            const filtered = query
                ? cars.filter(c =>
                    c.make.toLowerCase().includes(query)  ||
                    c.model.toLowerCase().includes(query) ||
                    String(c.year).includes(query)        ||
                    c.color.toLowerCase().includes(query))
                : cars;

            const tbody = document.getElementById('car-table-body');
            tbody.innerHTML = '';

            document.getElementById('stats').textContent =
                `Showing ${filtered.length} of ${cars.length} car(s)`;

            if (filtered.length === 0) {
                document.getElementById('empty-message').style.display = 'block';
                return;
            }
            document.getElementById('empty-message').style.display = 'none';

            filtered.forEach((car, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${escapeHtml(car.make)}</td>
                    <td>${escapeHtml(car.model)}</td>
                    <td>${car.year}</td>
                    <td>${escapeHtml(car.color)}</td>
                    <td>
                        <div class="actions">
                            <button class="btn-edit" onclick="editCar(${car.id})">✏️ Edit</button>
                            <button class="btn-delete" onclick="deleteCar(${car.id})">🗑️ Delete</button>
                        </div>
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // ── Init ─────────────────────────────────────────────────────────────
        loadCars();
        renderTable();
    </script>
</body>
</html>
